server:
  port: 8080

spring:
  profiles:
    active: dev
    include:
      - env # 在当前目录下新建 application-env.yml 配置敏感信息
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver # 驱动名称
    url: jdbc:mysql://localhost:3306/sky_take_out
    username: root
    password: 123456


mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true
sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast-admin-secret-key-2026-safe!
    # 设置jwt过期时间
    admin-ttl: 86400000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    # 小程序的jwt配置
    user-secret-key: itcast-user-secret-key-2026-safe!
    user-ttl: 86400000
    user-token-name: authentication

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html


 #Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql
  page-size-zero: true

